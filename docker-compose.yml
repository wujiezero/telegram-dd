services:
  telegram-dd:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-download
    environment:
      - TELEGRAM_DAEMON_API_ID=
      - TELEGRAM_DAEMON_API_HASH=
      - TELEGRAM_DAEMON_CHANNEL=
      - TELEGRAM_DAEMON_DEST=/downloads
      - TELEGRAM_DAEMON_SESSION_PATH=/session
      # 某些 NAS/面板的 bind mount 目录可读但不可创建锁文件；遇到权限问题时可打开这一项。
      #- TELEGRAM_DAEMON_LOCK_FILE=/tmp/DownloadDaemon.lock
      - TELEGRAM_DAEMON_WORKERS=2
      # 单文件多连接并行下载，用于吃满 Telegram Premium 放开的高速下载档。
      # >1 启用并行（建议 2~8，过多易触发 flood-wait）；设为 1 保持默认串行下载。
      - TELEGRAM_DAEMON_PARALLEL_CONNECTIONS=4
      # 仅体积 >= 此值（MB）的文件走并行下载，小文件并行收益低。
      - TELEGRAM_DAEMON_PARALLEL_MIN_SIZE_MB=10
      - TELEGRAM_DAEMON_PROXY_RESOLVE_ONCE=1
      # 开启 Web UI 鉴权；留空则为开放访问（老行为）
      - TELEGRAM_DAEMON_WEB_TOKEN=
      # 如果通过 HTTPS 反代再暴露，可以把 cookie 的 Secure 打开
      - TELEGRAM_DAEMON_WEB_COOKIE_SECURE=0
      # Proxy configuration (uncomment and modify if needed)
      #- TELEGRAM_DAEMON_PROXY_HOST=x.x.x.x
      #- TELEGRAM_DAEMON_PROXY_PORT=7890
      #- TELEGRAM_DAEMON_PROXY_TYPE=socks5
      # Proxy authentication (uncomment and modify if needed)
      #- TELEGRAM_DAEMON_PROXY_USERNAME=your_username
      #- TELEGRAM_DAEMON_PROXY_PASSWORD=your_password
    ports:
      - 7373:7373
    # 容器以 root 运行（见 Dockerfile）——宿主目录不需要做 chown。
    volumes:
      - ./downloads:/downloads
      - ./sessions:/session
      - ./db:/app/db
      - ./logs:/app/logs
    tmpfs:
      - /tmp
    # 额外硬化选项：禁止新获得特权、最小能力集
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, sys; r=urllib.request.urlopen('http://127.0.0.1:7373/healthz', timeout=3); sys.exit(0 if r.status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  downloads:
  sessions:
